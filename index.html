<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'none';
    script-src 'self' http://localhost:5173;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: appimg:;
    connect-src 'self' http://localhost:5173 ws://localhost:5173;
    font-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'none';
    frame-src 'none';
  "
    />
    <meta name="description" content="notetaking app" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/sidebar.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/editor.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="drag-region">
        <div class="frame-left"></div>
        <div class="frame-right">
          <div class="frame-info">
            <button class="app-pin-btn">
              <i data-lucide="pin"></i>
            </button>
            <time id="datetime-display"></time>
          </div>
          <div class="toolbar-hover-zone">
            <span class="top-toolbar-dots"></span>
            <div class="top-toolbar"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-container">
        <div class="sidebar-notes">
          <div class="sidebar-header">
            <div class="input-wrapper">
              <i data-lucide="search" class="search-icon"></i>
              <input
                type="search"
                class="search-input"
                placeholder="Search Notes / Tags with #"
                data-tippy-content="Search All Notes / Tags"
                data-shortcut="Mod+G"
              />
            </div>
            <button class="all-tags-btn">
              <i data-lucide="tag"></i>
            </button>
            <button class="import-btn" data-tippy-content="Import File">
              <i data-lucide="file-up"></i>
            </button>
            <button
              class="add-note-btn"
              data-tippy-content="New Note"
              data-shortcut="Mod+N"
            >
              <i data-lucide="plus"></i>
            </button>
          </div>
          <div class="notes-container"></div>
          <div class="sidebar-selection-footer collapsed"></div>
          <div class="sidebar-footer">
            <button
              class="settings-btn"
              data-tippy-content="Settings"
              data-shortcut="Mod+,"
            >
              <i data-lucide="sliders-horizontal"></i>
            </button>
            <span
              class="info-span note-count"
              data-tippy-content="Total Notes"
            ></span>
          </div>
        </div>
        <div class="resizer-sidebar"></div>
      </div>
      <div class="editor-container">
        <div class="editor-view hidden">
          <div class="editor-header">
            <div id="toolbar"></div>
          </div>
          <div class="metadata-container collapsed"></div>
          <div id="editor"></div>
          <div class="input-wrapper-editor invisible">
            <button class="input-wrapper-chevron">
              <i data-lucide="chevron-right"></i>
            </button>
            <input
              type="search"
              class="search-input-editor"
              placeholder="Search Note"
              data-tippy-content="Search Note Content"
              data-shortcut="Mod+F"
            />
            <button
              type="button"
              class="search-prev"
              data-tippy-content="Previous"
              data-shortcut="Shift+Enter"
            >
              <i data-lucide="chevron-up"></i>
            </button>
            <button
              type="button"
              class="search-next"
              data-tippy-content="Next"
              data-shortcut="Enter"
            >
              <i data-lucide="chevron-down"></i>
            </button>
          </div>
          <div class="input-wrapper-editor-replace invisible">
            <input
              type="text"
              class="replace-input-editor"
              placeholder="Replace"
            />
            <button
              type="button"
              class="replace-one"
              data-tippy-content="Replace"
              data-shortcut="Enter"
            >
              <i data-lucide="replace"></i>
            </button>
            <button
              type="button"
              class="replace-all"
              data-tippy-content="Replace All"
              data-shortcut="Mod+Alt+Enter"
            >
              <i data-lucide="replace-all"></i>
            </button>
          </div>
          <div class="toc-dots"></div>
          <div class="toc-hover-zone">
            <div class="toc"></div>
          </div>
          <div class="footer-bar-hover-zone">
            <div class="footer-bar-dots"></div>
            <div class="stats">
              <div class="count-stats">
                <span id="word-count">0 words</span>
                <span><span id="char-count">0</span> characters</span>
              </div>
              <span id="reading-time"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="spinner" popover="manual"></div>
    <dialog id="delete-dialog" class="delete-dialog">
      <form method="dialog" class="delete-dialog-form">
        <button
          class="delete-close-btn"
          data-tippy-content="Close"
          data-shortcut="Escape"
          value="cancel"
        >
          <i data-lucide="x" class="delete-close-icon"></i>
        </button>
        <div class="delete-dialog-header">
          <span class="delete-dialog-title"></span>
        </div>
        <div class="delete-dialog-content">
          <p class="delete-dialog-description">
            This action is permanent and cannot be undone.
          </p>
          <button
            value="confirm"
            class="delete-confirm-btn"
            id="confirm-delete-btn"
          >
            Confirm Delete
          </button>
        </div>
      </form>
    </dialog>
    <dialog class="settings-modal">
      <form method="dialog" novalidate>
        <div class="settings-quick-actions"></div>
        <button
          class="close-setting-modal-btn"
          value="cancel"
          data-tippy-content="Close"
          data-shortcut="Escape"
        >
          <i data-lucide="x"></i>
        </button>
        <div class="settings-selection">
          <div class="settings-title">Settings</div>
        </div>
        <div class="settings-content" data-activetab="Appearance"></div>
      </form>
    </dialog>
    <template id="sidebar-empty-state-template">
      <div class="sidebar-empty-state empty-state-content">
        <div class="empty-state-icon">
          <i id="sidebar-empty-icon" data-lucide="library"></i>
        </div>
        <h3 class="empty-state-title"></h3>
        <p class="empty-state-description">
          <strong class="hidden"></strong>
        </p>
      </div>
    </template>
    <template id="editor-empty-state-template">
      <div class="editor-empty-state" inert>
        <div class="empty-state-content">
          <i data-lucide="file-question" class="empty-state-icon"></i>
          <h2 class="empty-state-title">No note selected</h2>
          <p class="empty-state-description">
            Create a new note with <kbd>Ctrl</kbd>/<kbd>Cmd</kbd> +
            <kbd>N</kbd>, or select an existing note from the sidebar.
          </p>
        </div>
      </div>
    </template>
    <template id="note-item-template">
      <div class="note-item">
        <div class="note-header">
          <div class="icon-div">
            <i data-lucide="pin" data-tippy-content="Pinned" class="pin"></i>
          </div>
          <span class="note-title"></span>
          <button class="menu-btn">
            <span class="dots"></span>
          </button>
          <input
            class="select-checkbox"
            type="checkbox"
            aria-label="Select note"
          />
        </div>
        <div class="note-metadata">
          <div class="note-date"></div>
        </div>
        <div class="note-tags"></div>
        <div class="note-content"></div>
      </div>
    </template>
    <script type="module" src="src/app.ts" defer></script>
  </body>
</html>
