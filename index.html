<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'none';
    script-src 'self' http://localhost:5173;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: appimg:;
    connect-src 'self' http://localhost:5173 ws://localhost:5173;
    font-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'none';
    frame-src 'none';
  "
    />
    <meta name="description" content="notetaking app" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/buttons.css" />
    <link rel="stylesheet" href="src/css/sidebar.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/editor.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="drag-region">
        <div class="frame-left"><time id="datetime-display"></time></div>
        <div class="frame-right">
          <div class="toolbar-hover-zone">
            <div class="top-toolbar">
              <button class="read-only-btn">
                <i data-lucide="glasses"></i>
              </button>
              <button class="focus-btn"><i data-lucide="focus"></i></button>
              <button class="editor-width-btn">
                <i data-lucide="ruler-dimension-line"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="sidebar-container">
        <div class="sidebar-notes">
          <div class="sidebar-header">
            <div class="input-wrapper">
              <i data-lucide="search" class="search-icon"></i>
              <input
                type="search"
                id="searchInput"
                class="search-input"
                placeholder="search notes"
              />
            </div>
            <button class="add-note-btn" title="add new note">
              <i data-lucide="plus"></i>
            </button>
          </div>
          <div class="notes-container"></div>
          <div class="sidebar-footer">
            <button
              popovertarget="settings-panel"
              class="tooltip"
              data-tooltip="settings"
              data-position="top-right"
            >
              <i data-lucide="sliders-horizontal"></i>
            </button>

            <button
              popovertarget="smart-views-popover"
              class="sidebar-trigger-btn"
            >
              <i data-lucide="list-filter"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="editor-container">
        <div class="editor-view hidden">
          <div class="editor-header">
            <div id="toolbar">
              <button class="collapse-btn">
                <i data-lucide="arrow-left-from-line" class="collapse-icon"></i>
              </button>
            </div>
            <div
              class="bubble-menu"
              data-active-menu="text"
              style="visibility: hidden"
            >
              <div class="tool-group text-tools">
                <button data-action="bold">
                  <i data-lucide="bold"></i>
                </button>
                <button data-action="italic">
                  <i data-lucide="italic"></i>
                </button>
                <button data-action="strike">
                  <i data-lucide="strikethrough"></i>
                </button>
                <button data-action="inlineCode">
                  <i data-lucide="code"></i>
                </button>
                <button data-action="link">
                  <i data-lucide="link"></i>
                </button>
                <button data-action="h1">
                  <i data-lucide="heading-1"></i>
                </button>
                <button data-action="h2">
                  <i data-lucide="heading-2"></i>
                </button>
                <button data-action="h3">
                  <i data-lucide="heading-3"></i>
                </button>
              </div>

              <div class="tool-group table-tools">
                <button data-action="addRowBefore">
                  <i data-lucide="between-vertical-start"></i>
                </button>
                <button data-action="addRowAfter">
                  <i data-lucide="between-vertical-end"></i>
                </button>
                <button data-action="addColumnBefore">
                  <i data-lucide="between-horizontal-start"></i>
                </button>
                <button data-action="addColumnAfter">
                  <i data-lucide="between-horizontal-end"></i>
                </button>
                <button data-action="deleteTable">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
              <div class="tool-group code-block-tools">
                <button data-action="copy">
                  <i data-lucide="copy"></i>
                </button>
                <button data-action="copyBlock">
                  <i data-lucide="copy-plus"></i>
                </button>
                <button data-action="duplicate">
                  <i data-lucide="repeat"></i>
                </button>
                <button data-action="toggleLanguage">
                  <i data-lucide="hash"></i>
                </button>
                <button data-action="delete">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
              <div class="tool-group inline-code-tools">
                <button data-action="copy">
                  <i data-lucide="copy"></i>
                </button>
                <button data-action="promote">
                  <i data-lucide="code-xml"></i>
                </button>
                <button data-action="removeFormat">
                  <i data-lucide="code"></i>
                </button>
                <button data-action="delete">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </div>
          </div>
          <button class="info-sidebar-toggle">
            <span class="dots"></span>
          </button>
          <div id="editor"></div>
          <div class="info-sidebar">
            <div class="info-sidebar-header">
              <h4>Note-Info</h4>
            </div>
            <div class="info-sidebar-metadata">
              <span class="info-span">Task status: </span>
              <div class="todo-progress-container" style="display: none">
                <div class="todo-stats">
                  <span>Tasks</span>
                  <span id="todo-count">0/0</span>
                </div>
                <div class="progress-bar-bg">
                  <div id="todo-progress" class="progress-bar-fill"></div>
                </div>
              </div>
              <div class="sidebar-section"></div>
              <span class="info-span">Tags: </span>
              <div class="tag-container"></div>
              <div class="sidebar-section"></div>
              <div class="stats">
                <div class="count-stats">
                  <span id="word-count">0 words</span>
                  <span><span id="char-count">0</span> characters</span>
                </div>
                <span id="reading-time"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="toast-container"></div>
    </div>
    <div id="settings-panel" class="settings-p" popover class="settings-p">
      <div class="settings-p-header">
        <div class="settings-title">Settings</div>
      </div>
      <div class="settings-p-body">
        <div class="settings-field">
          <label for="theme">Theme:</label>
          <select id="theme" class="theme-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="light-warm">Light (Warm)</option>
            <option value="dark">Dark</option>
            <option value="dark-warm">Dark (Warm)</option>
          </select>
        </div>
        <div class="settings-field">
          <label for="code-theme">Code-Theme:</label>
          <select id="code-theme" class="theme-select">
            <option value="focus">Focus</option>
            <option value="balanced">Balanced</option>
            <option value="eye-comfort">Eye Comfort</option>
          </select>
        </div>
      </div>
      <div class="settings-section"></div>
      <div class="settings-p-body">
        <div class="settings-field">
          <label for="font-family">Font:</label>
          <select id="font-family" class="theme-select">
            <option value="system">System</option>
            <option value="arial">Arial</option>
            <option value="verdana">Verdana</option>
            <option value="georgia">Georgia</option>
            <option value="garamond">Garamond</option>
            <option value="tahoma">Tahoma</option>
          </select>
        </div>
        <div class="settings-field">
          <label for="font-size">
            <i class="select-icon" data-lucide="a-large-small"></i>
            Font-Size:</label
          >
          <select id="font-size" class="theme-select">
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16 -</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="24">24</option>
          </select>
        </div>
      </div>
      <div class="settings-section"></div>
      <div class="settings-p-body">
        <div class="settings-field">
          <button class="focus-editor-btn">Focus</button>
        </div>
        <div class="settings-field">
          <div class="select-wrapper">
            <select id="line-height" data-action="selectLineHeight">
              <option value="1.2">1.2</option>
              <option value="1.3">1.3</option>
              <option value="1.4">1.4</option>
              <option value="1.5">1.5 -</option>
              <option value="1.6">1.6</option>
              <option value="1.7">1.7</option>
            </select>
            <i class="select-icon" data-lucide="unfold-vertical"></i>
          </div>
        </div>
      </div>
    </div>
    <div id="smart-views-popover" popover>
      <ul class="smart-view-list">
        <li><button data-view="all">All Notes</button></li>
        <li><button data-view="bookmarked">Bookmarked</button></li>
        <li><button data-view="pinned">Pinned</button></li>
        <li><button data-view="todos">Pending Todos</button></li>
        <li><button data-view="untagged">Untagged Notes</button></li>
      </ul>
    </div>
    <div class="overlay"></div>
    <div class="modal">
      <button class="closeModal-btn" title="close modal">
        <i data-lucide="x"></i>
      </button>
    </div>
    <script type="module" src="src/app.ts" defer></script>
  </body>
</html>
