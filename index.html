<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'none';
    script-src 'self' http://localhost:5173;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: appimg:;
    connect-src 'self' http://localhost:5173 ws://localhost:5173;
    font-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'none';
    frame-src 'none';
  "
    />
    <meta name="description" content="notetaking app" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="src/css/global.css" />
    <link rel="stylesheet" href="src/css/sidebar.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/editor.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="drag-region">
        <div class="frame-left"></div>
        <div class="frame-right">
          <time id="datetime-display"></time>
          <div class="filter-container"></div>
          <div class="toolbar-hover-zone">
            <div class="top-toolbar"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-container">
        <div class="sidebar-notes">
          <div class="sidebar-header">
            <div class="input-wrapper">
              <i data-lucide="search" class="search-icon"></i>
              <input
                type="search"
                class="search-input"
                placeholder="search notes"
                data-tippy-content="Search Note Content"
                data-shortcut="Mod+F"
              />
            </div>
            <button class="import-btn" data-tippy-content="Import File">
              <i data-lucide="file-up"></i>
            </button>
            <button
              class="add-note-btn"
              data-tippy-content="New Note"
              data-shortcut="Mod+N"
            >
              <i data-lucide="plus"></i>
            </button>
          </div>
          <div class="notes-container"></div>
          <div class="sidebar-footer">
            <button
              class="settings-btn"
              data-tippy-content="Settings"
              data-shortcut="Mod+,"
            >
              <i data-lucide="sliders-horizontal"></i>
            </button>
            <select
              class="view-select"
              data-tippy-content="Filter Notes"
            ></select>
            <span class="info-span note-count"></span>
          </div>
        </div>
      </div>

      <div class="editor-container">
        <div class="editor-view hidden">
          <div class="editor-header">
            <div id="toolbar"></div>
          </div>
          <button
            class="info-sidebar-toggle"
            data-tippy-content="Toggle Infobar"
            data-shortcut="Mod+Alt+O"
          >
            <span class="dots"></span>
          </button>
          <div id="editor"></div>
          <div class="info-sidebar">
            <div class="info-sidebar-metadata">
              <span class="info-span creation-date">Creation date:</span>
              <div class="info-sidebar-header"></div>
              <div class="sidebar-section"></div>
              <span class="info-span">Task status: </span>
              <div class="todo-progress-container" style="display: none">
                <div class="todo-stats">
                  <span>Tasks</span>
                  <span id="todo-count">0/0</span>
                </div>
                <div class="progress-bar-bg">
                  <div id="todo-progress" class="progress-bar-fill"></div>
                </div>
              </div>
              <div class="sidebar-section"></div>
              <span class="info-span">Tags: </span>
              <div class="tag-container"></div>
              <div class="sidebar-section"></div>
              <span class="info-span">Links: </span>
              <div class="link-container"></div>
              <div class="sidebar-section"></div>
              <div class="stats">
                <div class="count-stats">
                  <span id="word-count">0 words</span>
                  <span><span id="char-count">0</span> characters</span>
                </div>
                <span id="reading-time"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="toast-container" popover="manual"></div>
    </div>
    <div class="spinner" popover="manual"></div>
    <dialog id="delete-dialog" class="delete-dialog">
      <form method="dialog" class="delete-dialog-form">
        <button
          class="delete-close-btn"
          data-tippy-content="Close"
          data-shortcut="Escape"
          value="cancel"
        >
          <i data-lucide="x" class="delete-close-icon"></i>
        </button>
        <div class="delete-dialog-header">
          <span class="delete-dialog-title">Delete this note?</span>
        </div>
        <div class="delete-dialog-content">
          <p class="delete-dialog-description">
            This action is permanent and cannot be undone.
          </p>
          <button
            value="confirm"
            class="delete-confirm-btn"
            id="confirm-delete-btn"
          >
            Delete Note
          </button>
        </div>
      </form>
    </dialog>
    <dialog class="merge-modal">
      <form method="dialog" novalidate>
        <button
          class="close-btn"
          value="cancel"
          data-tippy-content="Close"
          data-shortcut="Escape"
        >
          <i data-lucide="x"></i>
        </button>
        <div class="merge-modal-selection">
          <div class="merge-title">Merge Note</div>
        </div>
        <div class="merge-modal-content">
          <label for="noteId">Note ID (UUID)</label>
          <input
            type="text"
            id="noteId"
            name="noteId"
            placeholder="00000000-0000-0000-0000-000000000000"
            maxlength="40"
            spellcheck="false"
            autocomplete="off"
            data-tippy-content="Valid Note ID Required"
          />
          <button
            class="confirm-btn"
            value="confirm"
            data-tippy-content="Confirm Merge"
          >
            Merge
          </button>
          <p class="info-note">
            Note with this ID gets merged into the selected one.
          </p>
        </div>
      </form>
    </dialog>
    <dialog class="settings-modal">
      <form method="dialog" novalidate>
        <button
          class="close-setting-modal-btn"
          value="cancel"
          data-tippy-content="Close"
          data-shortcut="Escape"
        >
          <i data-lucide="x"></i>
        </button>
        <div class="settings-selection">
          <div class="settings-title">Settings</div>
        </div>
        <div class="settings-content" data-activetab="Appearance"></div>
      </form>
    </dialog>
    <template id="sidebar-empty-state-template">
      <div class="sidebar-empty-state empty-state-content">
        <div class="empty-state-icon">
          <i id="sidebar-empty-icon" data-lucide=""></i>
        </div>
        <h3 class="empty-state-title"></h3>
        <p class="empty-state-description"></p>
      </div>
    </template>
    <template id="editor-empty-state-template">
      <div class="editor-empty-state" inert>
        <div class="empty-state-content">
          <i data-lucide="file-question" class="empty-state-icon"></i>
          <h2 class="empty-state-title">No note selected</h2>
          <p class="empty-state-description">
            Create a new note by clicking the
            <button class="empty-state-add-note-btn">
              <i data-lucide="plus" class="empty-state-plus-icon"></i>
            </button>
            button,<br />
            or select an existing note from the sidebar.
          </p>
        </div>
      </div>
    </template>
    <template id="note-item-template">
      <div class="note-item">
        <div class="note-header">
          <div class="icon-div">
            <i data-lucide="pin" data-tippy-content="Pinned" class="pin"></i>
            <i
              data-lucide="bookmark"
              data-tippy-content="Bookmarked"
              class="bookmark"
            ></i>
          </div>
          <span class="note-title"></span>
          <button class="menu-btn">
            <span class="dots"></span>
          </button>
        </div>
        <div class="note-metadata">
          <div class="note-date"></div>
        </div>
        <div class="note-tags"></div>
        <div class="note-content"></div>
      </div>
    </template>
    <script type="module" src="src/app.ts" defer></script>
  </body>
</html>
